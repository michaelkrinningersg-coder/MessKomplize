name: Build Win7 32-bit EXE

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4
    
    - name: Python 3.8 (32-bit) einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        architecture: 'x86'    # Der magische 32-Bit Befehl für Windows 7
        
    - name: Bibliotheken installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Icon fuer EXE erzeugen
      run: |
        pip install pillow
        python -c "from PIL import Image; image = Image.open('Icon.PNG').convert('RGBA'); image.save('Icon.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])"
        
    - name: EXE mit PyInstaller bauen
      # Anführungszeichen wegen Leerzeichen im Dateinamen
      # Hidden Imports für Module die PyInstaller nicht automatisch findet
      run: >
        pyinstaller --onefile --windowed
        --icon=Icon.ico
        --add-data "Icon.PNG;."
        --hidden-import serial.tools.list_ports
        --hidden-import serial.tools.list_ports_windows
        --hidden-import tkinter
        --hidden-import tkinter.ttk
        "MK - MessKomplize.py"
      
    - name: Fertige EXE als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: MessKomplize-Win7-32bit
        path: dist/*.exe
